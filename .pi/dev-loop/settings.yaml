version: 1

gates:
  draft:
    dynamicAngles: true
    angles:
      - scope
      - coverage
      - correctness
      - ci-guard
      - contract-surface
      - input-validation
      - determinism
      - no-op
      - link-check
      - packaging-runtime
      - state-concurrency
      - config-drift
      - gate-evidence
      - pr-description
    requireCi: true
    blockCleanOnFindingSeverities:
      - must-fix
      - worth-fixing-now
  preApproval:
    angles:
      - dry
      - kiss
      - yagni
      - srp
      - soc
      - deep
      - docs
      - ocp
      - lsp
      - isp
      - dip
      - renderer-security
    blockCleanOnFindingSeverities:
      - must-fix
      - worth-fixing-now

workflow:
  requireRetrospective: true
  requireRetrospectiveGate: true
  requireDraftFirst: true
  devModeDefault: true
