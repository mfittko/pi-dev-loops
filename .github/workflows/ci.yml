name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install workspace dependencies
        run: npm ci

      - name: Resolve Playwright runtime version
        id: playwright-version
        run: |
          VERSION="$(node -e "const lock = require('./package-lock.json'); const version = lock.packages?.['node_modules/@playwright/test']?.version ?? lock.dependencies?.['@playwright/test']?.version; if (!version) throw new Error('Missing @playwright/test version in package-lock.json'); process.stdout.write(version);")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browser runtime
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Prepare APT cache paths
        run: |
          sudo mkdir -p /var/cache/apt/archives/partial /var/lib/apt/lists/partial
          sudo chown -R "$USER:$USER" /var/cache/apt/archives /var/lib/apt/lists

      - name: Cache APT packages for Playwright dependencies
        id: playwright-apt-cache
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/apt/lists
          key: playwright-apt-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright WebKit system dependencies
        run: npx playwright install-deps webkit

      - name: Install Playwright WebKit runtime (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install webkit

      - name: Run canonical verify suite
        run: npm run verify

      - name: Run inspect-run viewer WebKit smoke
        run: npm run test:playwright:viewer
