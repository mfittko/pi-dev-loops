name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright
      PLAYWRIGHT_APT_CACHE_PATH: ${{ github.workspace }}/.cache/apt-archives

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install workspace dependencies
        run: npm ci

      - name: Resolve Playwright runtime version
        id: playwright-version
        run: |
          VERSION="$(node -e "const lock = require('./package-lock.json'); const version = lock.packages?.['node_modules/@playwright/test']?.version ?? lock.dependencies?.['@playwright/test']?.version; if (!version) throw new Error('Missing @playwright/test version in package-lock.json'); process.stdout.write(version);")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browser runtime
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Prepare APT cache paths
        run: |
          mkdir -p "$PLAYWRIGHT_APT_CACHE_PATH/partial"
          sudo tee /etc/apt/apt.conf.d/99github-playwright-cache >/dev/null <<EOF
          Dir::Cache::archives "${PLAYWRIGHT_APT_CACHE_PATH}";
          EOF

      - name: Cache APT package archives for Playwright dependencies
        id: playwright-apt-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.PLAYWRIGHT_APT_CACHE_PATH }}
            !${{ env.PLAYWRIGHT_APT_CACHE_PATH }}/partial
          key: playwright-apt-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright WebKit system dependencies
        run: npx playwright install-deps webkit

      - name: Normalize APT cache permissions
        if: always()
        run: sudo chmod -R a+rX "$PLAYWRIGHT_APT_CACHE_PATH"

      - name: Install Playwright WebKit runtime (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install webkit

      - name: Run canonical verify suite
        run: npm run verify

      - name: Run inspect-run viewer WebKit smoke
        run: npm run test:playwright:viewer
